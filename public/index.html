<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Receipt Sorter</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="kicker">Receipt Sorter</p>
          <h1>副業の領収書・売上メモを、申告前に整理する</h1>
          <p class="lead">雑に残した支出、売上、メモを貼り付けると、カテゴリ候補と確認リストをブラウザ内で作ります。</p>
        </div>
        <div class="price">
          <span>初期検証価格</span>
          <strong>980円から</strong>
          <small>レビュー依頼は承認制</small>
        </div>
      </section>

      <section class="workspace">
        <form id="cleanup-form" class="panel">
          <label>
            メモ
            <textarea id="raw-notes" rows="14" placeholder="例:
2026/6/1 コンビニ コピー代 240円
6/2 BOOTH 売上 3,200円
Amazon 梱包材 1,180円
交通費 打ち合わせ 680円"></textarea>
          </label>

          <div class="grid">
            <label>
              用途
              <select id="use-case">
                <option value="sidejob">副業</option>
                <option value="seller">フリマ・EC販売</option>
                <option value="freelance">個人事業</option>
              </select>
            </label>
            <label>
              対象月
              <input id="period" type="month">
            </label>
          </div>

          <label class="checkbox">
            <input id="review-request" type="checkbox">
            OpenClawレビュー依頼用パッケージも作る
          </label>

          <div class="actions">
            <button type="button" id="preview-button">整理する</button>
            <button type="button" id="download-button" disabled>JSONを保存</button>
          </div>

          <p class="notice">個人番号、カード番号、医療情報、給与情報、顧客の秘密情報は入力しないでください。</p>
        </form>

        <section class="panel result">
          <div class="result-header">
            <h2>整理結果</h2>
            <span id="status-pill">未実行</span>
          </div>
          <div id="summary" class="summary"></div>
          <table>
            <thead>
              <tr>
                <th>種類</th>
                <th>カテゴリ</th>
                <th>金額</th>
                <th>メモ</th>
              </tr>
            </thead>
            <tbody id="result-body"></tbody>
          </table>
          <div id="checklist" class="checklist"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
