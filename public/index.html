<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Receipt Sorter</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="kicker">Receipt Sorter</p>
          <h1>メルカリ・BOOTHの月次収支を仕分ける。</h1>
        </div>
        <div class="top-actions">
          <button type="button" id="demo-button" class="ghost">サンプル</button>
          <button type="button" id="csv-button" disabled>CSV</button>
          <button type="button" id="review-button" disabled>レビュー依頼</button>
        </div>
      </header>

      <section class="flow">
        <div class="step active"><span>1</span>貼る</div>
        <div class="step"><span>2</span>確認</div>
        <div class="step"><span>3</span>出力</div>
      </section>

      <section class="layout">
        <aside class="capture">
          <div class="capture-head">
            <h2>販売メモ</h2>
            <span id="status-pill">未整理</span>
          </div>
          <textarea id="raw-notes" rows="12" placeholder="メルカリ 売上 2480
メルカリ 送料 750
BOOTH 売上 3200
梱包材 1180
コピー代 240"></textarea>
          <div class="meta-row">
            <select id="platform" aria-label="販路">
              <option value="mercari-booth">メルカリ + BOOTH</option>
              <option value="mercari">メルカリ</option>
              <option value="booth">BOOTH</option>
              <option value="other">その他</option>
            </select>
            <input id="period" type="month" aria-label="対象月">
          </div>
          <button type="button" id="preview-button" class="primary">仕分ける</button>
          <label class="review-toggle">
            <input id="review-request" type="checkbox">
            レビュー依頼パッケージを作る
          </label>
          <p class="notice">個人番号、カード番号、医療・給与・顧客秘密情報は入力しないでください。</p>
        </aside>

        <section class="dashboard">
          <div class="offer-strip">
            <div>
              <strong>月次レビュー 980円</strong>
              <span>不明行だけ確認。税務判断ではなく整理補助です。</span>
            </div>
            <span>初期検証中</span>
          </div>

          <div class="summary" id="summary"></div>

          <div class="review-strip">
            <div>
              <strong id="review-count">0件</strong>
              <span>確認が必要</span>
            </div>
            <div class="bar"><span id="confidence-bar"></span></div>
          </div>

          <div class="cards" id="result-cards"></div>

          <div class="export-panel">
            <button type="button" id="checklist-button" class="ghost" disabled>確認リスト</button>
            <button type="button" id="csv-button-bottom" disabled>月次CSV</button>
          </div>

          <div class="checklist" id="checklist"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
